############
# Port     #
############
server:
  port: ${PORT:8080}

############
# SPRING   #
############
spring:
  # JPA 설정
  jpa:
    hibernate:
      dialect: org.hibernate.dialect.MariaDBDialect
      ddl-auto: update
  # DB Info
  datasource:
    url: jdbc:mariadb://localhost:3306/ticket
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123}
    driver-class-name: org.mariadb.jdbc.Driver
    # hikari setting
    hikari:
      pool-name: Ticket-HikariPool
      maximum-pool-size: 10      # DB와 맺을 최대 커넥션 수 (트래픽에 맞춰 조절)
      minimum-idle: 10           # 유지할 최소 유휴 커넥션 수 (보통 maximum과 동일하게 설정하여 성능 최적화)
      auto-commit: true          # 자동 커밋 여부 (기본값)
      connection-timeout: 30000  # 커넥션 확보를 위해 대기할 최대 시간 (ms)

  # Redis 설정 (Redisson 클라이언트)
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms



