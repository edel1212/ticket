spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MariaDB
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
    show-sql: true
  data:
    redis:
      host: localhost
      port: 6379

snow-flake:
  datacenter-id: 1
  worker-id: 1

jwt:
  secret: "test-secret-key-that-is-at-least-256-bits-long-for-hs256-algorithm-testing"
  access-token-expiration: 3600000
  refresh-token-expiration: 604800000
